<script>

let currentLang = "pl";

const weddingDate = new Date("Sep 5, 2026 16:00:00").getTime();

/* LICZNIK */

function updateCountdown() {

    const now = new Date().getTime();
    const distance = weddingDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));

    const el = document.getElementById("countdown");

    if(!el) return;

    if(currentLang === "de") {
        el.innerHTML =
        days + " Tage " + hours + " Std " + minutes + " Min";
    }
    else {
        el.innerHTML =
        days + " dni " + hours + " godz " + minutes + " min";
    }

}

setInterval(updateCountdown, 1000);
updateCountdown();

/* JĘZYK */

function setLang(lang) {

    currentLang = lang;

    document.querySelectorAll('.trans').forEach(el => {

        if(lang === 'de') {
            el.innerHTML = el.getAttribute('data-de');
        }
        else {
            el.innerHTML = el.getAttribute('data-pl');
        }

    });

    updateCountdown();

}

/* UKRYWANIE STUDIO */

const miejsceSelect =
document.getElementById('miejsceSelect');

const pokojSelect =
document.getElementById('pokojSelect');

if(miejsceSelect && pokojSelect) {

    function updatePokojOptions() {

        const value = miejsceSelect.value;

        for (let i = 0; i < pokojSelect.options.length; i++) {

            const option = pokojSelect.options[i];

            if (option.text.includes('Studio')) {

                option.style.display =
                value === 'Osada Zborów'
                ? 'none'
                : 'block';

            }

        }

        if (
            value === 'Osada Zborów' &&
            pokojSelect.value.includes('Studio')
        ) {
            pokojSelect.selectedIndex = 0;
        }

    }

    miejsceSelect.addEventListener(
        'change',
        updatePokojOptions
    );

    updatePokojOptions();

}

/* FORMULARZ + SPRAWDZANIE DAT */

const form =
document.getElementById('noclegForm');

if(form) {

    form.addEventListener(
        'submit',
        async function(e) {

        e.preventDefault();

        const od =
        form.querySelector(
        'input[name="Od"]'
        ).value;

        const doData =
        form.querySelector(
        'input[name="Do"]'
        ).value;

        if(od && doData) {

            const odDate =
            new Date(od);

            const doDateObj =
            new Date(doData);

            if(doDateObj < odDate) {

                if(currentLang === "de") {

                    alert(
                    "Das Abreisedatum kann nicht vor dem Anreisedatum liegen."
                    );

                }
                else {

                    alert(
                    "Data wyjazdu nie może być wcześniejsza niż data przyjazdu."
                    );

                }

                return;

            }

        }

        const data =
        new FormData(form);

        await fetch(
            form.action,
            {
                method: 'POST',
                body: data,
                headers: {
                    'Accept':
                    'application/json'
                }
            }
        );

        form.reset();

        const msg =
        document.getElementById(
        'successMessage'
        );

        if(msg) {
            msg.style.display = 'block';
        }

    });

}

/* ANIMACJE — BEZPIECZNE */

window.addEventListener(
"load",
() => {

    const sections =
    document.querySelectorAll(
    "section"
    );

    sections.forEach(sec => {

        sec.style.opacity = "1";
        sec.style.transform =
        "translateY(0)";

        sec.classList.add(
        "visible"
        );

    });

});

</script>
</script>
