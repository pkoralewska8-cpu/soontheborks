<script>

let currentLang = "pl";

const weddingDate =
new Date("Sep 5, 2026 16:00:00").getTime();

function updateCountdown() {

const now = new Date().getTime();
const distance = weddingDate - now;

const days =
Math.floor(distance / (1000 * 60 * 60 * 24));

const hours =
Math.floor((distance %
(1000*60*60*24)) /
(1000*60*60));

const minutes =
Math.floor((distance %
(1000*60*60)) /
(1000*60));

if(currentLang === "de") {

document.getElementById("countdown")
.innerHTML =
days + " Tage " +
hours + " Std " +
minutes + " Min";

}
else {

document.getElementById("countdown")
.innerHTML =
days + " dni " +
hours + " godz " +
minutes + " min";

}

}

setInterval(updateCountdown, 1000);

function setLang(lang) {

currentLang = lang;

document
.querySelectorAll('.trans')
.forEach(el => {

if(lang === 'de') {
el.innerHTML =
el.getAttribute('data-de');
}
else {
el.innerHTML =
el.getAttribute('data-pl');
}

});

updateCountdown();

}

setLang('pl');

</script>
